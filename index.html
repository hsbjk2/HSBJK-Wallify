<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HSBJK Wallify – Premium Wallpapers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --card:#111827;
  --accent:#38bdf8;
  --brand:#22c55e;
  --text:#e5e7eb;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{background:#020617;color:var(--text)}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 35px;background:rgba(0,0,0,.45);
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:10
}
nav button{
  background:none;border:1px solid var(--accent);color:var(--accent);
  padding:8px 18px;border-radius:20px;cursor:pointer;margin-left:10px;
  transition:.3s
}
nav button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px var(--accent);
}

/* 🔥 HEADER LOGO GLOW + ZOOM (ONLY ADDITION) */
.site-logo{
  transition:transform 0.4s ease, filter 0.4s ease;
}
.site-logo:hover{
  transform:scale(1.12);
  filter:
    drop-shadow(0 0 10px rgba(56,189,248,0.8))
    drop-shadow(0 0 22px rgba(56,189,248,0.6));
}
.site-logo:active{
  transform:scale(0.95);
}

/* HERO */
.hero{text-align:center;padding:40px}

/* GALLERY */
.gallery{
  padding:35px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px
}

/* CARD */
.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
  transition:.3s;
  cursor:pointer
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px var(--accent)
}
.card img{
  width:100%;
  height:190px;
  object-fit:cover;
  display:block
}
.card-content{
  padding:12px;
  font-size:13px;
  opacity:.75
}

/* PREVIEW MODAL */
.modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,.95);
  display:none;justify-content:center;align-items:center;
  z-index:999
}
.preview-box{
  position:relative;
  max-width:90%;
}
.preview-box img{
  max-width:100%;
  max-height:90vh;
  border-radius:12px;
}

/* PREVIEW CONTROLS */
.preview-controls{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(0,0,0,.75);
  padding:12px;
  display:flex;
  justify-content:center;
  gap:15px;
  border-radius:0 0 12px 12px;
}
.preview-controls select,
.preview-controls button{
  padding:8px 16px;
  border-radius:20px;
  border:none;
  font-weight:bold;
  transition:.3s
}
.preview-controls select{
  background:#111827;color:#fff
}
.preview-controls button{
  background:var(--accent);cursor:pointer
}
.preview-controls select:hover,
.preview-controls button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px var(--accent);
}

/* CLOSE */
.modal span{
  position:absolute;top:20px;right:30px;
  font-size:30px;cursor:pointer;color:#fff;
  transition:.3s
}
.modal span:hover{
  transform:scale(1.3);
  text-shadow:0 0 15px var(--accent);
}

/* ABOUT */
.about{
  max-width:900px;
  margin:50px auto;
  padding:30px;
  text-align:center;
  opacity:.8
}

/* FOOTER */
footer{text-align:center;padding:20px;opacity:.6}
</style>
</head>

<body>

<header>
  <img src="logo2.png" alt="HSBJK Wallify" class="site-logo" style="height:70px;cursor:pointer;">
  <nav>
    <button onclick="filterWallpapers('desktop')">Desktop</button>
    <button onclick="filterWallpapers('mobile')">Mobile</button>
    <button onclick="filterWallpapers('all')">All</button>
  </nav>
</header>

<section class="hero">
  <h2>Premium Wallpapers</h2>
  <p>Download ultra-high-quality wallpapers for desktop and mobile devices</p>
</section>

<section class="gallery" id="gallery"></section>

<!-- PREVIEW MODAL -->
<div class="modal" id="previewModal">
  <span onclick="closePreview()">✕</span>
  <div class="preview-box">
    <img id="previewImg">
    <div class="preview-controls">
      <select id="previewResolution">
        <option value="720p">720p</option>
        <option value="1080p">1080p</option>
        <option value="2K">2K</option>
        <option value="4K">4K</option>
      </select>
      <button onclick="downloadFromPreview()">Download</button>
    </div>
  </div>
</div>

<section class="about">
  <h3>About HSBJK Wallify</h3>
  <p>
    HSBJK Wallify now uses a seed-based wallpaper system that guarantees
    every wallpaper is unique, stable, and fully loaded with no repetition
    or blank images.
  </p>
</section>

<footer>© 2026 HSBJK Wallify</footer>

<script>
const gallery = document.getElementById("gallery");
const modal = document.getElementById("previewModal");
const previewImg = document.getElementById("previewImg");
const previewRes = document.getElementById("previewResolution");

let currentSeed = null;
let currentType = "desktop";

const TOTAL = 1000, BATCH = 20;
let loaded = 0;

const sizeMap = {
  desktop:{'720p':'1280/720','1080p':'1920/1080','2K':'2560/1440','4K':'3840/2160'},
  mobile:{'720p':'720/1280','1080p':'1080/1920','2K':'1440/2560','4K':'2160/3840'}
};

function openPreview(seed,type){
  currentSeed = seed;
  currentType = type;
  previewImg.src = `https://picsum.photos/seed/${seed}/1200/800`;
  modal.style.display = "flex";
}
function closePreview(){ modal.style.display="none"; }

async function downloadFromPreview(){
  if(!currentSeed) return;
  const q = previewRes.value;
  const size = sizeMap[currentType][q];
  const url = `https://picsum.photos/seed/${currentSeed}/${size}`;
  const res = await fetch(url);
  const blob = await res.blob();
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `HSBJK_${q}_${currentSeed}.jpg`;
  a.click();
}

function createCard(i){
  const type = i % 2 === 0 ? 'desktop' : 'mobile';
  const seed = `hsbjk-${i}`;

  const c = document.createElement("div");
  c.className = "card";
  c.dataset.type = type;
  c.innerHTML = `
    <img src="https://picsum.photos/seed/${seed}/600/400"
         loading="lazy"
         onclick="openPreview('${seed}','${type}')">
    <div class="card-content">
      Wallpaper ${i} • ${type}
    </div>
  `;
  return c;
}

function loadBatch(){
  const f = document.createDocumentFragment();
  for(let i=loaded+1;i<=loaded+BATCH && i<=TOTAL;i++){
    f.appendChild(createCard(i));
  }
  gallery.appendChild(f);
  loaded += BATCH;
}
loadBatch();

window.addEventListener("scroll",()=>{
  if(innerHeight + scrollY >= document.body.offsetHeight - 300 && loaded < TOTAL)
    loadBatch();
});

function filterWallpapers(t){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = (t==="all" || c.dataset.type===t) ? "block" : "none";
  });
}
</script>

</body>
</html>
